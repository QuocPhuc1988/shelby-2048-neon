<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="2048 Cyberpunk Edition — Play the classic 2048 puzzle game with a neon cyberpunk aesthetic and Aptos Shelby Protocol blockchain sync." />
  <title>2048 · Shelby Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Background particles -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <div class="app-container">
    <!-- ── Header ── -->
    <header class="game-header">
      <div class="brand">
        <h1 class="logo">2048<span class="logo-sub">SHELBY</span></h1>
        <p class="brand-credit"><span class="brand-by">by</span><span class="brand-name">GiaPhat SDZ</span></p>
      </div>

      <div class="score-cluster">
        <div class="score-card" id="score-card">
          <span class="score-label">SCORE</span>
          <span class="score-value" id="score-display">0</span>
        </div>
        <div class="score-card best-card">
          <span class="score-label">BEST</span>
          <span class="score-value" id="best-display">0</span>
        </div>
        <div class="score-card timer-card">
          <span class="score-label">TIME</span>
          <span class="score-value timer-value" id="timer-display">00:00</span>
        </div>
        <button class="btn-audio" id="audio-btn" aria-label="Toggle background music" title="Toggle BGM">
          <span id="audio-icon">🔊</span>
        </button>
      </div>
    </header>

    <!-- ── Control Bar ── -->
    <div class="control-bar">
      <button class="btn btn-primary" id="new-game-btn" aria-label="Start new game">
        <span class="btn-icon">⟳</span> NEW GAME
      </button>
      <button class="btn btn-pause" id="pause-btn" aria-label="Pause / Resume game">
        <span id="pause-icon">⏸</span> <span id="pause-label">PAUSE</span>
      </button>
      <button class="btn btn-wallet" id="wallet-btn" aria-label="Connect Aptos wallet">
        <span class="btn-icon">◈</span> <span id="wallet-label">CONNECT WALLET</span>
      </button>
    </div>

    <!-- ── Game Board ── -->
    <main class="board-wrapper" role="main">
      <div class="board-glow" aria-hidden="true"></div>
      <div class="board" id="game-board" role="grid" aria-label="2048 game grid">
        <!-- 16 background cells -->
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
        <div class="cell" role="gridcell"></div>
      </div>
      <!-- Tile layer rendered by JS -->
      <div class="tile-layer" id="tile-layer" aria-live="polite"></div>
      <!-- Pause overlay -->
      <div class="pause-overlay" id="pause-overlay" hidden aria-live="assertive">
        <div class="pause-glitch" aria-hidden="true">PAUSED</div>
        <p class="pause-sub">// GAME SUSPENDED</p>
        <button class="btn btn-pause" id="resume-btn" aria-label="Resume game">
          <span>▶</span> RESUME
        </button>
      </div>
    </main>

    <!-- ── Instructions ── -->
    <footer class="instructions">
      <span>⌨ WASD / ←↑→↓ &nbsp;|&nbsp; 👆 SWIPE &nbsp;|&nbsp; 🖱 DRAG</span>
    </footer>
  </div>

  <!-- ── Game Over Modal ── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-card">
      <div class="modal-glitch" aria-hidden="true">GAME OVER</div>
      <h2 class="modal-title" id="modal-title">TRANSMISSION ENDED</h2>
      <p class="modal-subtitle">Your run has been logged by the Shelby Protocol.</p>

      <div class="modal-stats">
        <div class="modal-stat">
          <span class="modal-stat-label">FINAL SCORE</span>
          <span class="modal-stat-value" id="modal-score">0</span>
        </div>
        <div class="modal-stat">
          <span class="modal-stat-label">BEST TILE</span>
          <span class="modal-stat-value" id="modal-best-tile">0</span>
        </div>
        <div class="modal-stat">
          <span class="modal-stat-label">TIME PLAYED</span>
          <span class="modal-stat-value modal-time" id="modal-time">00:00</span>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-primary" id="modal-new-game" aria-label="Start a new game">
          <span class="btn-icon">⟳</span> PLAY AGAIN
        </button>
        <button class="btn btn-shelby" id="sync-shelby-btn"
          aria-label="Sync score to Shelby Protocol on Aptos blockchain">
          <span class="btn-icon">◈</span> SYNC TO SHELBY
        </button>
      </div>

      <div class="sync-status" id="sync-status" hidden></div>
    </div>
  </div>

  <!-- ── Wallet Toast ── -->
  <div class="toast" id="wallet-toast" role="alert" aria-live="assertive" hidden>
    <span id="toast-msg"></span>
  </div>

  <script src="app.js"></script>
</body>

</html>
